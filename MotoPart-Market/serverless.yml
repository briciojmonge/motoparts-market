service: moto-parts-market

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: dev
  environment:
    DYNAMODB_TABLE: PartsTable
    DYNAMODB_ENDPOINT: http://127.0.0.1:8000
    AWS_ACCESS_KEY_ID: dummy
    AWS_SECRET_ACCESS_KEY: dummy
    AWS_REGION: us-east-1

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Query
          Resource:
            - !GetAtt PartsTable.Arn
            - !Sub '${PartsTable.Arn}/index/*'

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000

resources:
  Resources:
    PartsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: PartsTable
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: tipo
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: TipoIndex
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - http:
          path: /
          method: get
          cors: true

  createPart:
    handler: src/handlers/createPart.handler
    events:
      - http:
          path: partes
          method: post
          cors: true

  getParts:
    handler: src/handlers/getParts.handler
    events:
      - http:
          path: partes
          method: get
          cors: true