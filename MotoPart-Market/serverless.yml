# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: fausto24
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: moto-parts-mart
service: moto-parts-market


provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ''
  environment:
    DYNAMODB_TABLE: PartsTable
    AWS_ACCESS_KEY_ID: dummy
    AWS_SECRET_ACCESS_KEY: dummy
    AWS_REGION: local
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Query
          Resource: !GetAtt PartsTable.Arn



resources:
  Resources:
    PartsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: PartsTable
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: tipo
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: TipoIndex
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

plugins:
  - serverless-offline

custom:
  serverless-offline:
    port: 3000
    httpPort: 3000

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - http:
          path: /
          method: any
          cors: true

  createPart:
    handler: src/handlers/createPart.handler
    events:
      - http:
          path: partes
          method: post
          cors: true

  getParts:
    handler: src/handlers/getParts.handler
    events:
      - http:
          path: partes
          method: get
          cors: true